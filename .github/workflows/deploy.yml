# Deploys ONLY a redirect page to GitHub Pages (shivrajsinhzala.github.io → shivrajsinh.in).
# The full site is built and hosted on Cloudflare Pages — not here.
name: GitHub.io redirect

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-redirect
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload redirect artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: github-pages-redirect

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
