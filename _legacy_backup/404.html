<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Shivrajsinh Zala</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #f8f7f4;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,0,0,0.04) 39px, rgba(0,0,0,0.04) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,0,0,0.04) 39px, rgba(0,0,0,0.04) 40px);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #0a0a0a;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .code {
            font-size: clamp(6rem, 20vw, 15rem);
            font-weight: 800;
            line-height: 1;
            color: #FF006E;
            text-shadow: 6px 6px 0 #000;
        }
        .message {
            font-size: clamp(1rem, 3vw, 1.5rem);
            margin: 1.5rem 0 2rem;
            color: #333;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: #0a0a0a;
            color: #fff;
            text-decoration: none;
            border: 3px solid #000;
            font-family: inherit;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 6px 6px 0 0 #FFE900;
            transition: all 0.2s;
        }
        .btn:hover {
            transform: translate(-4px, -4px);
            box-shadow: 10px 10px 0 0 #FF006E;
        }
        .sub {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <p class="message">This page doesn't exist.<br>But I do. Let's go back.</p>
        <a href="/" class="btn">← BACK TO PORTFOLIO</a>
        <p class="sub">SZ://DEV — shivrajsinhzala.github.io</p>
    </div>
</body>
</html>
