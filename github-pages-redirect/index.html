<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>Redirecting to shivrajsinh.in</title>
    <link rel="canonical" href="https://shivrajsinh.in/">
    <meta http-equiv="refresh" content="0;url=https://shivrajsinh.in/">
    <script>
        (function () {
            var path = location.pathname.replace(/\/index\.html$/i, '/');
            if (path.length > 1 && path.endsWith('.html')) path = path.slice(0, -5);
            var target = 'https://shivrajsinh.in' + (path === '/' ? '/' : path) + location.search + location.hash;
            location.replace(target);
        })();
    </script>
</head>
<body>
    <p style="font-family: system-ui, sans-serif; padding: 2rem;">
        This site has moved to
        <a href="https://shivrajsinh.in/">shivrajsinh.in</a>.
    </p>
</body>
</html>
