    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --term-bg: #0a0a0a;
            --term-chrome: #1a1a1a;
            --term-border: #333;
            --term-green: #00FF88;
            --term-cyan: #00F5FF;
            --term-pink: #FF006E;
            --term-yellow: #FFE900;
            --term-orange: #FF5E00;
            --term-white: #e0e0e0;
            --term-gray: #666;
            --term-dim: #444;
        }

        html, body {
            height: 100%;
            background: #0a0a0a;
            color: var(--term-white);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
        }

        ::selection {
            background: var(--term-pink);
            color: #fff;
        }

        /* ===== PAGE TRANSITION OVERLAY ===== */
        .page-transition {
            position: fixed;
            inset: 0;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        .page-transition .bar {
            flex: 1;
            background: var(--term-green);
            transform: scaleX(0);
            transform-origin: left;
        }

        .page-transition.exit .bar {
            transform-origin: right;
        }

        /* ===== TERMINAL WINDOW ===== */
        .terminal-wrapper {
            height: 100vh;
            width: 100vw;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            opacity: 0;
        }

        .terminal-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 3px solid var(--term-border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 255, 136, 0.08), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        /* ===== TITLE BAR ===== */
        .terminal-titlebar {
            background: var(--term-chrome);
            border-bottom: 2px solid var(--term-border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        .titlebar-dots {
            display: flex;
            gap: 8px;
        }

        .titlebar-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .titlebar-dot:hover { opacity: 0.7; }
        .dot-red { background: #FF5F57; border-color: #E0443E; }
        .dot-yellow { background: #FEBC2E; border-color: #DEA123; }
        .dot-green { background: #28C840; border-color: #1AAB29; }

        .titlebar-title {
            flex: 1;
            text-align: center;
            font-size: 12px;
            color: var(--term-gray);
            letter-spacing: 1px;
        }

        .titlebar-tag {
            font-size: 10px;
            color: var(--term-bg);
            background: var(--term-green);
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* ===== TERMINAL BODY ===== */
        .terminal-body {
            flex: 1;
            background: var(--term-bg);
            padding: 20px;
            overflow-y: auto;
            font-size: clamp(12px, 1.5vw, 14px);
            line-height: 1.7;
            scroll-behavior: smooth;
        }

        .terminal-body::-webkit-scrollbar { width: 8px; }
        .terminal-body::-webkit-scrollbar-track { background: var(--term-bg); }
        .terminal-body::-webkit-scrollbar-thumb { background: var(--term-border); border-radius: 4px; }
        .terminal-body::-webkit-scrollbar-thumb:hover { background: var(--term-green); }

        /* ===== OUTPUT STYLING ===== */
        .output-block {
            margin-bottom: 12px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .prompt { color: var(--term-green); font-weight: 700; }
        .prompt-path { color: var(--term-cyan); }
        .prompt-symbol { color: var(--term-pink); }
        .cmd-text { color: var(--term-white); }

        .accent { color: var(--term-green); }
        .accent-cyan { color: var(--term-cyan); }
        .accent-pink { color: var(--term-pink); }
        .accent-yellow { color: var(--term-yellow); }
        .accent-orange { color: var(--term-orange); }
        .dim { color: var(--term-dim); }
        .bold { font-weight: 700; }
        .error { color: #FF5F57; }

        .ascii-art {
            color: var(--term-green);
            font-size: clamp(8px, 1.2vw, 12px);
            line-height: 1.3;
            opacity: 0.9;
        }

        .table-row { display: flex; gap: 8px; }
        .table-key { color: var(--term-cyan); min-width: 140px; flex-shrink: 0; }
        .table-val { color: var(--term-white); }

        .skill-bar-track {
            display: inline-block;
            width: 120px;
            background: var(--term-dim);
            height: 4px;
            border-radius: 2px;
            overflow: hidden;
            vertical-align: middle;
            margin: 0 8px;
        }

        .skill-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.8s ease;
        }

        /* Tab completion hint */
        .tab-completions {
            color: var(--term-cyan);
            margin: 4px 0 8px;
        }

        /* ===== INPUT LINE ===== */
        .input-line {
            display: flex;
            align-items: center;
            gap: 0;
            margin-top: 4px;
        }

        .input-line input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--term-white);
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(12px, 1.5vw, 14px);
            flex: 1;
            caret-color: var(--term-green);
            padding: 0;
            margin: 0;
        }

        .input-line input::placeholder { color: var(--term-dim); }

        /* ===== BACK BUTTON ===== */
        .back-btn {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 100;
            background: var(--term-green);
            color: var(--term-bg);
            border: 3px solid var(--term-green);
            padding: 10px 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
        }

        .back-btn:hover {
            background: transparent;
            color: var(--term-green);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        /* ===== SCANLINE EFFECT ===== */
        .scanline {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 136, 0.015) 2px,
                rgba(0, 255, 136, 0.015) 4px
            );
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .terminal-wrapper { padding: 0; }
            .terminal-window { border-radius: 0; border-left: 0; border-right: 0; }
            .terminal-body { padding: 12px; }
            .back-btn { bottom: 1rem; right: 1rem; padding: 8px 14px; font-size: 10px; }
            .table-key { min-width: 100px; }
            .skill-bar-track { width: 80px; }
            .ascii-art { font-size: 7px; }
        }
    </style>
</head>

'matrix': () => {
    startMatrix();
    return `<span class="accent-green">Wake up, Neo...</span>`;
},
'rickroll': () => {
    setTimeout(() => window.open('https://www.youtube.com/watch?v=dQw4w9WgXcQ', '_blank'), 1000);
    return `<span class="accent-cyan">Initializing audio payload... Stand by.</span>`;
},
'secrets': () => `
<span class="accent bold">в•”в•җв•җв•җ TOP SECRET в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—</span>
<span class="dim">  Shh... don't tell anyone. Try typing these:</span>
  
  <span class="accent-yellow">coffee</span>   <span class="dim">вҖ” Get caffeinated</span>
  <span class="accent-green">matrix</span>   <span class="dim">вҖ” Enter the simulation</span>
  <span class="accent-red">sudo</span>     <span class="dim">вҖ” Try your luck</span>
  <span class="accent-cyan">rickroll</span> <span class="dim">вҖ” Do not type this.</span>
<span class="accent bold">в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ</span>`,
'clear': () => 'CLEAR',
'back': () => 'BACK', 'exit': () => 'BACK', 'quit': () => 'BACK',
        };

        // fake file system for cat
        const FAKE_FILES = {
            'about.md': () => COMMANDS['about'](),
            'skills.json': () => COMMANDS['skills'](),
            'package.json': () => `<span class="dim">{</span>\n  <span class="accent-cyan">"name"</span>: <span class="accent-yellow">"shivrajsinh-portfolio"</span>,\n  <span class="accent-cyan">"version"</span>: <span class="accent-yellow">"2.0.0"</span>,\n  <span class="accent-cyan">"author"</span>: <span class="accent-yellow">"Shivrajsinh Zala"</span>,\n  <span class="accent-cyan">"dependencies"</span>: {\n    <span class="accent-cyan">"gsap"</span>: <span class="accent-yellow">"^3.12.5"</span>,\n    <span class="accent-cyan">"lenis"</span>: <span class="accent-yellow">"^1.1.13"</span>,\n    <span class="accent-cyan">"chai"</span>: <span class="accent-yellow">"вҲһ"</span>\n  }\n<span class="dim">}</span>`,
            'resume.pdf': () => `<span class="error">Error: cannot display binary file. Try: about, skills, experience</span>`,
        };

        // в•җв•җв•җ HELPERS в•җв•җв•җ
        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function scrollEnd() { requestAnimationFrame(() => { termBody.scrollTop = termBody.scrollHeight; }); }
        function appendBlock(html) {
            const b = document.createElement('div');
            b.className = 'output-block';
            b.innerHTML = html;
            output.appendChild(b);
        }
        function moveCursorEnd() {
            setTimeout(() => cmdInput.setSelectionRange(cmdInput.value.length, cmdInput.value.length), 0);
        }

        // в•җв•җв•җ TAB COMPLETION в•җв•җв•җ
        function getMatches(prefix) {
            if (!prefix) return COMMAND_NAMES.slice().sort();
            const p = prefix.toLowerCase();
            return COMMAND_NAMES.filter(c => c.startsWith(p)).sort();
        }

        function longestCommon(arr) {
            if (!arr.length) return '';
            let p = arr[0];
            for (let i = 1; i < arr.length; i++) {
                while (arr[i].indexOf(p) !== 0) p = p.slice(0, -1);
                if (!p) return '';
            }
            return p;
        }

        function handleTab() {
            const val = cmdInput.value;
            const prefix = val.trimStart();

            // CYCLING: if user pressed Tab before with same prefix, cycle
            if (lastTabPrefix !== null && prefix === lastTabPrefix && tabMatches.length > 1) {
                tabCycleIndex = (tabCycleIndex + 1) % tabMatches.length;
                cmdInput.value = tabMatches[tabCycleIndex];
                lastTabPrefix = tabMatches[tabCycleIndex];
                return;
            }

            // FRESH TAB
            const matches = getMatches(prefix);
            tabMatches = matches;
            tabCycleIndex = 0;
            lastTabPrefix = prefix;

            if (matches.length === 0) return;

            if (matches.length === 1) {
                cmdInput.value = matches[0];
                lastTabPrefix = null;
                tabMatches = [];
                return;
            }

            // Fill to common prefix
            const common = longestCommon(matches);
            if (common.length > prefix.length) {
                cmdInput.value = common;
                lastTabPrefix = common;
            }

            // Show all matches below
            appendBlock(
                PROMPT_HTML + `<span class="cmd-text">${esc(val)}</span>\n` +
                '<span class="tab-completions">' +
                matches.map(m => {
                    const typed = prefix.length;
                    return `<span class="accent bold">${m.slice(0, typed)}</span><span class="accent-cyan">${m.slice(typed)}</span>`;
                }).join('    ') +
                '</span>'
            );
            scrollEnd();
        }

        function resetTab() { tabMatches = []; tabCycleIndex = -1; lastTabPrefix = null; }

        // в•җв•җв•җ LEVENSHTEIN (for "did you mean?") в•җв•җв•җ
        function lev(a, b) {
            const m = a.length, n = b.length;
            const d = Array.from({length: m+1}, () => Array(n+1).fill(0));
            for (let i = 0; i <= m; i++) d[i][0] = i;
            for (let j = 0; j <= n; j++) d[0][j] = j;
            for (let i = 1; i <= m; i++)
                for (let j = 1; j <= n; j++)
                    d[i][j] = Math.min(d[i-1][j]+1, d[i][j-1]+1, d[i-1][j-1]+(a[i-1]!==b[j-1]?1:0));
            return d[m][n];
        }

        function suggest(input) {
            let best = null, bestD = 4;
            for (const c of COMMAND_NAMES) {
                const d = lev(input, c);
                if (d < bestD) { bestD = d; best = c; }
            }
            return best;
        }

        // в•җв•җв•җ PROCESS COMMAND в•җв•җв•җ
        function processCommand(raw) {
            const trimmed = raw.trim();

            if (!trimmed) {
                appendBlock(PROMPT_HTML);
                scrollEnd();
                return;
            }

            const cmd = trimmed.toLowerCase();
            const parts = trimmed.split(/\s+/);
            const base = parts[0].toLowerCase();
            const args = parts.slice(1).join(' ');

            cmdHistory.push(trimmed);
            historyIndex = cmdHistory.length;
            savedInput = '';

            // Echo
            appendBlock(PROMPT_HTML + `<span class="cmd-text">${esc(trimmed)}</span>`);

            // CLEAR
            if (cmd === 'clear') { output.innerHTML = ''; return; }

            // BACK / EXIT / QUIT
            if (cmd === 'back' || cmd === 'exit' || cmd === 'quit') { navigateBack(); return; }

            // ECHO
            if (base === 'echo') {
                const b = document.createElement('div');
                b.className = 'output-block';
                b.textContent = args;
                output.appendChild(b);
                scrollEnd();
                return;
            }

            // CAT
            if (base === 'cat') {
                const file = args.trim();
                if (!file) {
                    appendBlock('<span class="error">usage: cat &lt;filename&gt;</span>\n<span class="dim">Try: cat about.md, cat package.json</span>');
                } else if (FAKE_FILES[file]) {
                    appendBlock(FAKE_FILES[file]());
                } else {
                    appendBlock(`<span class="error">cat: ${esc(file)}: No such file or directory</span>`);
                }
                scrollEnd();
                return;
            }

            // MAN
            if (base === 'man') {
                const topic = args.trim().toLowerCase();
                if (!topic) {
                    appendBlock('<span class="dim">What manual page do you want?\nFor example, try <span class="accent">man about</span></span>');
                } else if (COMMANDS[topic]) {
                    appendBlock(`<span class="accent bold">MANUAL: ${esc(topic.toUpperCase())}</span>\n\n<span class="dim">  Usage:</span> <span class="accent">${esc(topic)}</span>\n<span class="dim">  Displays information about ${esc(topic)}.</span>\n<span class="dim">  This is Shivrajsinh's portfolio terminal. Not bash.</span>`);
                } else {
                    appendBlock(`<span class="error">No manual entry for ${esc(topic)}</span>`);
                }
                scrollEnd();
                return;
            }

            // STANDARD COMMANDS
            const handler = COMMANDS[cmd];
            if (handler && typeof handler === 'function') {
                appendBlock(handler());
                scrollEnd();
                return;
            }

            // UNKNOWN вҖ” suggest
            const s = suggest(cmd);
            let errHtml = `<span class="error">command not found: ${esc(cmd)}</span>`;
            if (s) errHtml += `\n<span class="dim">Did you mean <span class="accent">${s}</span>? Type <span class="accent">--help</span> for all commands.</span>`;
            else errHtml += `\n<span class="dim">Type <span class="accent">--help</span> to see available commands.</span>`;
            appendBlock(errHtml);
            scrollEnd();
        }

        // в•җв•җв•җ INPUT HANDLER в•җв•җв•җ
        cmdInput.addEventListener('keydown', (e) => {
            // TAB
            if (e.key === 'Tab') { e.preventDefault(); handleTab(); return; }

            // Any non-tab resets tab state
            resetTab();

            // ENTER
            if (e.key === 'Enter') {
                processCommand(cmdInput.value);
                cmdInput.value = '';
                cmdInput.placeholder = '';
                return;
            }

            // вҶ‘ ARROW UP
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (cmdHistory.length === 0) return;
                if (historyIndex === cmdHistory.length) savedInput = cmdInput.value;
                if (historyIndex > 0) { historyIndex--; cmdInput.value = cmdHistory[historyIndex]; moveCursorEnd(); }
                return;
            }

            // вҶ“ ARROW DOWN
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < cmdHistory.length - 1) {
                    historyIndex++;
                    cmdInput.value = cmdHistory[historyIndex];
                } else if (historyIndex === cmdHistory.length - 1) {
                    historyIndex = cmdHistory.length;
                    cmdInput.value = savedInput;
                }
                moveCursorEnd();
                return;
            }

            // CTRL + L вҖ” clear
            if (e.ctrlKey && e.key === 'l') { e.preventDefault(); output.innerHTML = ''; return; }

            // CTRL + C вҖ” cancel
            if (e.ctrlKey && e.key === 'c') {
                e.preventDefault();
                appendBlock(PROMPT_HTML + `<span class="cmd-text">${esc(cmdInput.value)}</span><span class="dim">^C</span>`);
                cmdInput.value = ''; historyIndex = cmdHistory.length; savedInput = '';
                scrollEnd();
                return;
            }

            // CTRL + U вҖ” clear line
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); cmdInput.value = ''; return; }

            // CTRL + A вҖ” start of line
            if (e.ctrlKey && e.key === 'a') { e.preventDefault(); cmdInput.setSelectionRange(0, 0); return; }

            // CTRL + E вҖ” end of line
            if (e.ctrlKey && e.key === 'e') { e.preventDefault(); moveCursorEnd(); return; }

            // CTRL + K вҖ” kill to end
            if (e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                cmdInput.value = cmdInput.value.substring(0, cmdInput.selectionStart);
                return;
            }

            // CTRL + W вҖ” delete word back
            if (e.ctrlKey && e.key === 'w') {
                e.preventDefault();
                const pos = cmdInput.selectionStart;
                const before = cmdInput.value.substring(0, pos);
                const after = cmdInput.value.substring(pos);
                const trimmed = before.replace(/\s+$/, '');
                const lastSp = trimmed.lastIndexOf(' ');
                const newBefore = lastSp === -1 ? '' : trimmed.substring(0, lastSp + 1);
                cmdInput.value = newBefore + after;
                cmdInput.setSelectionRange(newBefore.length, newBefore.length);
                return;
            }
        });

        // Focus on click anywhere
        termBody.addEventListener('click', () => cmdInput.focus());

        // в•җв•җв•җ PAGE TRANSITIONS в•җв•җв•җ
        function navigateBack() {
            const bars = transition.querySelectorAll('.bar');
            transition.classList.add('exit');
            gsap.to(bars, {
                scaleX: 1, duration: 0.5, stagger: 0.05, ease: 'power4.inOut',
                onComplete: () => {
                    sessionStorage.setItem('page-transition', 'entering');
                    window.location.href = '/';
                }
            });
        }

        function playEntranceAnimation() {
            const bars = transition.querySelectorAll('.bar');
            const from = sessionStorage.getItem('page-transition');
            if (from === 'entering') {
                sessionStorage.removeItem('page-transition');
                gsap.set(bars, { scaleX: 1 });
                gsap.set(wrapper, { opacity: 1 });
                gsap.to(bars, {
                    scaleX: 0, duration: 0.5, stagger: 0.05, ease: 'power4.inOut', delay: 0.2,
                    onComplete: () => {
                        gsap.to(backBtn, { opacity: 1, duration: 0.5, delay: 0.3 });
                        typeBootSequence();
                    }
                });
            } else {
                gsap.to(wrapper, { opacity: 1, duration: 0.8, ease: 'power2.out', delay: 0.1 });
                gsap.to(backBtn, { opacity: 1, duration: 0.5, delay: 0.8 });
                typeBootSequence();
            }
        }

        // в•җв•җв•җ BOOT SEQUENCE в•җв•җв•җ
        function typeBootSequence() {
            const lines = [
                { t: '<span class="accent">Initializing SZ://TERMINAL v2.0...</span>', d: 200 },
                { t: '<span class="dim">Loading modules: WordPress, Squarespace, GSAP, Sarcasm...</span>', d: 400 },
                { t: '<span class="dim">Mounting fake filesystem...</span>', d: 250 },
                { t: '<span class="dim">Connecting to portfolio database...</span>', d: 300 },
                { t: '<span class="accent">Connection established. вң“</span>', d: 500 },
                { t: '', d: 200 },
                { t: '<span class="dim">Type</span> <span class="accent bold">--help</span> <span class="dim">to see commands. Press</span> <span class="accent bold">Tab</span> <span class="dim">to auto-complete.</span>', d: 0 },
                { t: '<span class="accent-yellow">Hint: Try ordering a drink or waking up Neo.</span>', d: 500 },
            ];

            let delay = 300;
            lines.forEach(line => {
                delay += line.d;
                setTimeout(() => { appendBlock(line.t); scrollEnd(); }, delay);
            });
            setTimeout(() => cmdInput.focus(), delay + 200);
        }

        // в•җв•җв•җ BACK BUTTON / DOT CLOSE в•җв•җв•җ
        backBtn.addEventListener('click', (e) => { e.preventDefault(); navigateBack(); });
        dotClose.addEventListener('click', () => navigateBack());

        // в•җв•җв•җ INIT в•җв•җв•җ
        playEntranceAnimation();

        // в•җв•җв•җ MATRIX EASTER EGG в•җв•җв•җ
        function startMatrix() {
            const canvas = document.getElementById('matrix-canvas');
            if (!canvas.classList.contains('hidden')) return;
            canvas.classList.remove('hidden');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const katakana = 'гӮўгӮЎгӮ«гӮөгӮҝгғҠгғҸгғһгғӨгғЈгғ©гғҜгӮ¬гӮ¶гғҖгғҗгғ‘гӮӨгӮЈгӮӯгӮ·гғҒгғӢгғ’гғҹгғӘгғ°гӮ®гӮёгғӮгғ“гғ”гӮҰгӮҘгӮҜгӮ№гғ„гғҢгғ•гғ гғҰгғҘгғ«гӮ°гӮәгғ–гғ…гғ—гӮЁгӮ§гӮұгӮ»гғҶгғҚгғҳгғЎгғ¬гғұгӮІгӮјгғҮгғҷгғҡгӮӘгӮ©гӮігӮҪгғҲгғҺгғӣгғўгғЁгғ§гғӯгӮҙгӮҫгғүгғңгғқгғҙгғғгғі';
            const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const nums = '0123456789';
            const alphabet = katakana + latin + nums;

            const fontSize = 16;
            const columns = canvas.width / fontSize;
            const drops = [];
            for (let x = 0; x < columns; x++) drops[x] = 1;

            function draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0F0';
                ctx.font = fontSize + 'px monospace';

                for (let i = 0; i < drops.length; i++) {
                    const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }

            const interval = setInterval(draw, 30);
            
            setTimeout(() => {
                clearInterval(interval);
                canvas.classList.add('hidden');
            }, 10000);
        }

        });
    </script>
    <canvas id="matrix-canvas" class="fixed inset-0 z-[100] hidden pointer-events-none mix-blend-screen opacity-50" style="background: transparent;"></canvas>
</body>
